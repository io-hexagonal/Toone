<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #141622; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; }
  canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; }

  /* ── UI overlay ── */
  .overlay {
    position: fixed; left: 50%; top: 50%;
    transform: translate(-50%, 0);
    z-index: 10; display: flex; flex-direction: column;
    align-items: center; pointer-events: none;
    margin-top: 160px;
  }
  .actions { pointer-events: auto; display: flex; flex-direction: column; gap: 12px; align-items: center; }

  /* ── Download buttons ── */
  .dl-btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    padding: 16px 32px; border-radius: 12px; min-width: 240px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.9); text-decoration: none;
    font-size: 14px; font-weight: 500; letter-spacing: 0.02em;
    transition: background 0.2s, border-color 0.2s, transform 0.15s;
    cursor: pointer; user-select: none;
  }
  .dl-btn:hover {
    background: rgba(255,255,255,0.14);
    border-color: rgba(255,255,255,0.25);
    transform: translateY(-1px);
  }
  .dl-btn:active { transform: translateY(0); }
  .dl-btn svg { width: 22px; height: 22px; fill: currentColor; flex-shrink: 0; margin-left: -2px; }
  .dl-btn .label { display: flex; flex-direction: column; line-height: 1.2; }
  .dl-btn .label small { font-size: 10px; opacity: 0.6; font-weight: 400; }

  /* ── Requirements tooltip ── */
  .tooltip {
    position: absolute; top: calc(100% + 12px); left: 50%; transform: translateX(-50%);
    background: rgba(20,22,34,0.95); backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 10px;
    padding: 14px 18px; min-width: 220px;
    color: rgba(255,255,255,0.8); font-size: 12px; line-height: 1.6;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  .tooltip::after {
    content: ''; position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
    border: 6px solid transparent; border-bottom-color: rgba(255,255,255,0.12);
  }
  .dl-btn-wrap { position: relative; }
  .dl-btn-wrap:hover .tooltip { opacity: 1; }

  .tooltip .req { display: flex; align-items: center; gap: 6px; }
  .tooltip .dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.3); flex-shrink: 0; }
  .tooltip .title { font-weight: 600; margin-bottom: 6px; color: rgba(255,255,255,0.95); font-size: 13px; }

  /* ── Tagline ── */
  .tagline {
    color: rgba(255,255,255,0.35); font-size: 13px;
    margin-bottom: 28px; letter-spacing: 0.08em; text-transform: lowercase;
  }

  /* ── Mobile: only show App Store ── */
  .desktop-only { display: flex; }
  @media (max-width: 640px) {
    .desktop-only { display: none !important; }
    .overlay { padding-bottom: 15vh; }
    .actions { flex-direction: column; }
  }

  /* ── Top-right nav ── */
  .top-nav {
    position: fixed; top: 16px; right: 16px; z-index: 20;
    display: flex; align-items: center; gap: 16px; pointer-events: auto;
  }
  .top-nav a {
    color: rgba(255,255,255,0.25);
    text-decoration: none;
    transition: color 0.2s;
  }
  .top-nav a:hover { color: rgba(255,255,255,0.5); }
  .top-nav .nav-text {
    font-size: 12px;
    letter-spacing: 0.04em;
    font-weight: 500;
  }
  .top-nav svg { width: 24px; height: 24px; fill: currentColor; display: block; }

  /* ── Footer links ── */
  .footer-links {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    z-index: 20; display: flex; gap: 20px; pointer-events: auto;
  }
  .footer-links a {
    color: rgba(255,255,255,0.2); text-decoration: none;
    font-size: 11px; letter-spacing: 0.04em;
    transition: color 0.2s;
  }
  .footer-links a:hover { color: rgba(255,255,255,0.45); }
</style>

<script>
// ─── Toone Outline Animation ────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const DOT_SIZE = 2.5;
const DOT_SPACING = 3.5;
const BG_COLOR = [0.078, 0.086, 0.118];

const COLOR_STORY = [
  [0.05, 0.15, 0.45], [0.1, 0.4, 1.0],   [0.0, 0.6, 0.8],
  [0.0, 0.7, 0.4],    [0.0, 0.85, 0.3],   [0.5, 0.9, 0.1],
  [1.0, 0.65, 0.0],   [1.0, 0.15, 0.45],  [0.7, 0.0, 0.9],
  [0.55, 0.1, 1.0],   [0.0, 0.5, 0.9],    [0.0, 0.7, 0.6],
];

let pixelData = null;
let fieldData = null;

function lerp(a, b, t) { return a + (b - a) * t; }
function lerpRGB(a, b, t) { return [lerp(a[0], b[0], t), lerp(a[1], b[1], t), lerp(a[2], b[2], t)]; }
function rgba(c, a) { return `rgba(${(c[0]*255)|0},${(c[1]*255)|0},${(c[2]*255)|0},${a})`; }
function mod(n, m) { return ((n % m) + m) % m; }

function buildFieldData(w, h) {
  const cols = Math.ceil(w / DOT_SPACING) + 1;
  const rows = Math.ceil(h / DOT_SPACING) + 1;

  let textEdgeCells = [], textInteriorCells = [];
  const textSet = new Set();

  if (pixelData) {
    const colOffset = Math.floor((cols - pixelData.gridCols) / 2);
    const rowOffset = Math.floor((rows - pixelData.gridRows) / 2);
    for (const p of pixelData.pixels) {
      const sc = p.col + colOffset, sr = p.row + rowOffset;
      if (sc >= 0 && sc < cols && sr >= 0 && sr < rows) textSet.add(sr * cols + sc);
    }
    for (const idx of textSet) {
      const r = Math.floor(idx / cols), c = idx % cols;
      let isEdge = false;
      for (let dr = -1; dr <= 1 && !isEdge; dr++)
        for (let dc = -1; dc <= 1 && !isEdge; dc++) {
          if (dr === 0 && dc === 0) continue;
          const nr = r + dr, nc = c + dc;
          if (nr < 0 || nr >= rows || nc < 0 || nc >= cols || !textSet.has(nr * cols + nc)) isEdge = true;
        }
      (isEdge ? textEdgeCells : textInteriorCells).push({ col: c, row: r });
    }
  }

  const totalCells = cols * rows;
  const distance = new Int32Array(totalCells).fill(-1);
  const queue = [];
  for (const idx of textSet) { distance[idx] = 0; queue.push(idx); }
  let head = 0;
  while (head < queue.length) {
    const idx = queue[head++], r = Math.floor(idx / cols), c = idx % cols, d = distance[idx];
    for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
      if (dr === 0 && dc === 0) continue;
      const nr = r + dr, nc = c + dc;
      if (nr < 0 || nr >= rows || nc < 0 || nc >= cols) continue;
      const nIdx = nr * cols + nc;
      if (distance[nIdx] === -1) { distance[nIdx] = d + 1; queue.push(nIdx); }
    }
  }

  let maxTextDist = 0;
  for (let i = 0; i < totalCells; i++) if (distance[i] > maxTextDist) maxTextDist = distance[i];

  const numSectors = 12, layerThickness = 20;
  const numLayers = Math.floor(maxTextDist / layerThickness) + 1;
  const centerCol = Math.floor(cols / 2), centerRow = Math.floor(rows / 2);

  const sectorLayerCells = [];
  for (let s = 0; s < numSectors; s++) {
    sectorLayerCells[s] = [];
    for (let l = 0; l < numLayers; l++) sectorLayerCells[s][l] = [];
  }

  for (let r = 0; r < rows; r++) for (let c = 0; c < cols; c++) {
    const d = distance[r * cols + c];
    if (d <= 0) continue;
    const layer = Math.min(Math.floor(d / layerThickness), numLayers - 1);
    let angle = Math.atan2(r - centerRow, c - centerCol);
    if (angle < 0) angle += 2 * Math.PI;
    const sector = Math.min(Math.floor(angle / (2 * Math.PI) * numSectors), numSectors - 1);
    sectorLayerCells[sector][layer].push({ col: c, row: r });
  }

  return { cols, rows, textEdgeCells, textInteriorCells, numSectors, numLayers, sectorLayerCells, centerCol, centerRow, distance };
}

const PROXIMITY_RADIUS = 8;

function renderOutline(elapsed) {
  if (!fieldData || fieldData.numSectors <= 0) return;
  const { numSectors, numLayers, sectorLayerCells, distance, cols } = fieldData;
  const halfSectors = numSectors / 2 | 0, storyCount = COLOR_STORY.length;

  const sweepX = Math.sin(elapsed * 1.3), sweepY = Math.cos(elapsed * 0.7);
  let sweepAngle = Math.atan2(sweepY, sweepX);
  if (sweepAngle < 0) sweepAngle += 2 * Math.PI;

  const colorDrift = elapsed * 0.4 + Math.sin(elapsed * 0.3) * 2.0 + Math.sin(elapsed * 0.13) * 1.5;
  const rotatePhase = elapsed * 0.35 + Math.sin(elapsed * 0.5) * 0.8 + Math.cos(elapsed * 0.19) * 0.5;

  for (let sector = 0; sector < numSectors; sector++) {
    const sectorAngle = (sector + 0.5) / numSectors * 2 * Math.PI;
    const mirrorSector = sector < halfSectors ? sector : (numSectors - 1 - sector);
    let angleDiff = Math.abs(sectorAngle - sweepAngle);
    if (angleDiff > Math.PI) angleDiff = 2 * Math.PI - angleDiff;
    const sweepGlow = Math.max(0, 1.0 - angleDiff * 2.0);
    const sectorColorOffset = mirrorSector + rotatePhase;

    for (let layer = 0; layer < numLayers; layer++) {
      const cells = sectorLayerCells[sector][layer];
      if (!cells || cells.length === 0) continue;

      const depthNorm = (numLayers - layer) / numLayers;
      const depthFactor = 1.0 + depthNorm * depthNorm * 1.8;
      let colorPos = mod(sectorColorOffset * depthFactor + colorDrift + layer * 0.7, storyCount);
      const cIdx = Math.floor(colorPos) % storyCount;
      const nextCIdx = (cIdx + 1) % storyCount;
      const layerColor = lerpRGB(COLOR_STORY[cIdx], COLOR_STORY[nextCIdx], colorPos - Math.floor(colorPos));

      const breatheBoost = Math.sin(elapsed * 1.2 + layer * 0.4) * 0.12;
      const distFade = layer / numLayers;
      const baseOp = Math.max(0.15, 0.65 - distFade * 0.30 + breatheBoost);
      const opacity = Math.min(0.85, baseOp + sweepGlow * 0.35);

      for (const cell of cells) {
        const d = distance[cell.row * cols + cell.col];
        let fc = layerColor, fo = opacity;
        if (d > 0 && d <= PROXIMITY_RADIUS) {
          const prox = 1.0 - (d / PROXIMITY_RADIUS);
          fc = lerpRGB(layerColor, [1.0, 1.0, 1.0], prox * prox * 0.45);
          fo = Math.min(0.92, opacity + prox * 0.15);
        }
        const scanDim = cell.row % 2 !== 0 ? 0.55 : 1.0;
        ctx.fillStyle = rgba(fc, fo * scanDim);
        ctx.fillRect(cell.col * DOT_SPACING - DOT_SIZE / 2, cell.row * DOT_SPACING - DOT_SIZE / 2, DOT_SIZE, DOT_SIZE);
      }
    }
  }

  renderText(elapsed);
}

function renderText(elapsed) {
  if (!fieldData) return;
  const textPulse = (Math.sin(elapsed * 2.0) + 1.0) / 2.0;
  const shimmer = (Math.sin(elapsed * 3.5) + 1.0) / 2.0;

  if (fieldData.textInteriorCells.length > 0) {
    const tint = textPulse * 0.08;
    ctx.fillStyle = rgba([1.0 - tint * 0.1, 1.0 - tint * 0.05, 1.0], 0.95 + shimmer * 0.05);
    for (const cell of fieldData.textInteriorCells)
      ctx.fillRect(cell.col * DOT_SPACING - DOT_SIZE / 2, cell.row * DOT_SPACING - DOT_SIZE / 2, DOT_SIZE, DOT_SIZE);
  }
  if (fieldData.textEdgeCells.length > 0) {
    const s = 0.95 + shimmer * 0.05;
    ctx.fillStyle = rgba([s, s, 1.0], 0.97 + shimmer * 0.03);
    for (const cell of fieldData.textEdgeCells)
      ctx.fillRect(cell.col * DOT_SPACING - DOT_SIZE / 2, cell.row * DOT_SPACING - DOT_SIZE / 2, DOT_SIZE, DOT_SIZE);
  }
}

let startTime = null;
function frame(timestamp) {
  if (!startTime) startTime = timestamp;
  ctx.fillStyle = rgba(BG_COLOR, 1);
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  if (fieldData) renderOutline((timestamp - startTime) / 1000);
  requestAnimationFrame(frame);
}

function resize() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  fieldData = buildFieldData(window.innerWidth, window.innerHeight);
}

window.addEventListener('resize', resize);
